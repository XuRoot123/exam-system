version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: exam-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: exam_system
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: exam-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: exam-app
    ports:
      - "7000:7000"
    environment:
      DB_HOST: mysql
      DB_PASSWORD: root
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis

volumes:
  mysql-data:
